services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}

  frontend:
    build:
      context: ./frontend
      args:
        - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    ports:
      - "4200:80"
    depends_on:
      - backend
