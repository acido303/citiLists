spring:
  application:
    name: cityLists
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://accounts.google.com
          jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs

app:
  google-client-id: ${GOOGLE_CLIENT_ID}

server:
  port: 8000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
